version: '3'

dotenv: ['.env']

tasks:
  setup:
    desc: Download Go dependencies
    sources:
      - go.mod
      - go.sum
    cmds:
      - go mod download

  env:
    desc: Copy .env.example to .env if .env doesn't exist
    status:
      - test -f .env
    cmds:
      - cp .env.example .env
      - echo "Created .env from .env.example — edit it and set your THREE_API_KEY"

  run:
    desc: Run the Amazon Bedrock hello world
    deps: [setup, env]
    cmds:
      - go run .

  default:
    desc: Setup everything and run
    cmds:
      - task: run
